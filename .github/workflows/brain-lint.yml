name: Brain Lint & Tests

on:
  push:
    paths:
      - 'core/src/**'
      - 'cli/src/**'
      - 'cli/tests/**'
      - '.brain/node/**'
      - 'node/**'
      - 'scripts/**'
      - '.claude/**'
      - '.opencode/**'
      - 'AGENTS.md'
      - 'agent-schema.json'
      - 'pins.json'
  pull_request:
    paths:
      - 'core/src/**'
      - 'cli/src/**'
      - 'cli/tests/**'
      - '.brain/node/**'
      - 'node/**'
      - 'scripts/**'
      - '.claude/**'
      - '.opencode/**'
      - 'AGENTS.md'
      - 'agent-schema.json'
      - 'pins.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ secrets.JARVIS_REPOS_TOKEN }}"}}'

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Checkout brain-core
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: jarvis-systems/brain-core
          path: core
          token: ${{ secrets.JARVIS_REPOS_TOKEN }}

      - name: Checkout brain-cli
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: jarvis-systems/brain-cli
          path: cli
          token: ${{ secrets.JARVIS_REPOS_TOKEN }}

      - name: Verify sub-repos
        run: |
          test -d core/src && echo "core/ checkout: OK" || { echo "::error::core/ checkout failed"; exit 1; }
          test -d cli/src && echo "cli/ checkout: OK" || { echo "::error::cli/ checkout failed"; exit 1; }

      - name: Setup PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # v2
        with:
          php-version: '8.2'

      - name: Install core dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: core

      - name: Schema validator tests
        run: ./vendor/bin/phpunit tests/McpSchemaValidatorTest.php
        working-directory: core

      - name: Core full test suite
        run: ./vendor/bin/phpunit --testdox
        working-directory: core

      - name: MCP syntax lint (compiled artifacts)
        run: bash scripts/lint-mcp-syntax.sh

      - name: LLM benchmark scenarios validation
        run: bash scripts/benchmark-llm-suite.sh --dry-run --json

      - name: Validate baselines JSON
        run: |
          jq empty .docs/benchmarks/baselines/baselines.json
          jq empty .docs/benchmarks/baselines/instruction-budgets.json

      - name: Instruction budget check (strict)
        run: bash scripts/check-instruction-budget.sh --strict

      - name: Verify pin policy
        run: bash scripts/verify-pins.sh
        env:
          PIN_STRICT: ${{ vars.PIN_STRICT || '0' }}

      - name: Secret scanning
        run: bash scripts/scan-secrets.sh

      - name: PHPStan static analysis (core)
        run: composer analyse
        working-directory: core

      - name: Install CLI dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: cli

      - name: PHPStan static analysis (CLI)
        run: composer analyse
        working-directory: cli

      - name: CLI unit tests (golden + exit guard)
        run: composer test
        working-directory: cli

      - name: Enterprise audit (blocking — P0 gate)
        run: bash scripts/audit-enterprise.sh

      - name: Compile discipline check
        run: |
          BASE_REF="${GITHUB_BASE_REF:-HEAD~1}"
          # Check if .brain/node/ or node/ sources changed (excluding node/Mcp/ — produces only .mcp.json which is gitignored)
          NODE_CHANGED=$(git diff --name-only "$BASE_REF"...HEAD -- '.brain/node/' 'node/' ':(exclude)node/Mcp/' 2>/dev/null | head -1)
          if [ -n "$NODE_CHANGED" ]; then
            # If node sources changed, compiled artifacts MUST also change
            COMPILED_CHANGED=$(git diff --name-only "$BASE_REF"...HEAD -- '.claude/' '.opencode/' 'AGENTS.md' 'agent-schema.json' 2>/dev/null | head -1)
            if [ -z "$COMPILED_CHANGED" ]; then
              echo "::error::Node sources changed but compiled artifacts (.claude/, .opencode/, AGENTS.md, agent-schema.json) were not updated."
              echo "Run 'brain compile' locally and commit the compiled output."
              echo ""
              echo "Changed source files:"
              git diff --name-only "$BASE_REF"...HEAD -- '.brain/node/' 'node/' ':(exclude)node/Mcp/'
              exit 1
            fi
            echo "Compile discipline: PASSED (sources + artifacts both updated)"
          else
            echo "Compile discipline: SKIPPED (no node source changes)"
          fi
