name: Brain LLM Benchmark

on:
  schedule:
    - cron: '0 3 * * *'
  pull_request:
    paths:
      - '.brain/node/**'
      - 'core/src/**'
      - 'scripts/benchmark-*'
      - '.docs/benchmarks/scenarios/**'
      - '.docs/benchmarks/baselines/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Benchmark profile'
        default: 'full'
        type: choice
        options:
          - smoke
          - ci
          - telemetry-ci
          - full
          - matrix
          - adversarial-matrix
      model:
        description: 'AI model'
        default: 'sonnet'
        type: choice
        options:
          - haiku
          - sonnet
          - opus

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Brain CLI
        run: composer global require jarvis-brain/cli --no-interaction

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run smoke test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAIN_AI_CMD: ${{ runner.tool_cache }}/../.composer/vendor/bin/ai
        run: bash scripts/benchmark-llm-suite.sh --scenario S00 --json --model haiku
        continue-on-error: true

  # PR gate: fast telemetry-ci profile (9 scenarios, haiku, ~2.5 min)
  pr-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: smoke-test
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Brain CLI
        run: composer global require jarvis-brain/cli --no-interaction

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run telemetry-ci benchmark
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAIN_AI_CMD: ${{ runner.tool_cache }}/../.composer/vendor/bin/ai
        run: |
          bash scripts/benchmark-llm-suite.sh \
            --json \
            --profile telemetry-ci \
            --model haiku \
            | tee benchmark-report-telemetry.json

      - name: Run CI benchmark
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAIN_AI_CMD: ${{ runner.tool_cache }}/../.composer/vendor/bin/ai
        run: |
          bash scripts/benchmark-llm-suite.sh \
            --json \
            --profile ci \
            --model haiku \
            | tee benchmark-report-ci.json

      - name: Regression check (telemetry-ci)
        run: bash scripts/benchmark-regression-check.sh benchmark-report-telemetry.json

      - name: Regression check (ci)
        run: bash scripts/benchmark-regression-check.sh benchmark-report-ci.json

      - name: Upload PR benchmark reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-benchmark-reports
          path: benchmark-report-*.json
          retention-days: 14

  # Nightly/manual: full profile with sonnet (skip if matrix selected)
  benchmark-suite:
    if: >-
      github.event_name != 'pull_request' &&
      (github.event.inputs.profile || 'full') != 'matrix' &&
      (github.event.inputs.profile || 'full') != 'adversarial-matrix'
    runs-on: ubuntu-latest
    needs: smoke-test
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Brain CLI
        run: composer global require jarvis-brain/cli --no-interaction

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Resolve profile and model
        id: params
        run: |
          PROFILE="${{ github.event.inputs.profile || 'full' }}"
          MODEL="${{ github.event.inputs.model || 'sonnet' }}"
          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"

      - name: Run benchmark suite
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAIN_AI_CMD: ${{ runner.tool_cache }}/../.composer/vendor/bin/ai
        run: |
          bash scripts/benchmark-llm-suite.sh \
            --json \
            --profile "${{ steps.params.outputs.profile }}" \
            --model "${{ steps.params.outputs.model }}" \
            | tee benchmark-report.json

      - name: Regression check
        run: |
          bash scripts/benchmark-regression-check.sh benchmark-report.json

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-report
          path: benchmark-report.json
          retention-days: 30

  # Nightly/manual: matrix stress harness (4 configs × stress subset)
  matrix-stress:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'matrix')
    runs-on: ubuntu-latest
    needs: smoke-test
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Brain CLI
        run: composer global require jarvis-brain/cli --no-interaction

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Resolve model
        id: params
        run: |
          MODEL="${{ github.event.inputs.model || 'haiku' }}"
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"

      - name: Run matrix stress
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAIN_AI_CMD: ${{ runner.tool_cache }}/../.composer/vendor/bin/ai
        run: |
          bash scripts/benchmark-llm-suite.sh \
            --matrix \
            --json \
            --model "${{ steps.params.outputs.model }}" \
            --yolo \
            | tee matrix-stress-report.json

      - name: Validate matrix JSON schema
        run: jq . matrix-stress-report.json > /dev/null

      - name: Check matrix results
        run: |
          CONFIGS_PASSED=$(jq -r '.summary.configs_passed' matrix-stress-report.json)
          TOTAL_CONFIGS=$(jq -r '.summary.total_configs' matrix-stress-report.json)
          TOTAL_FAILED=$(jq -r '.summary.total_failed' matrix-stress-report.json)
          echo "Matrix: $CONFIGS_PASSED/$TOTAL_CONFIGS configs passed, $TOTAL_FAILED scenarios failed"
          if [ "$CONFIGS_PASSED" -lt "$TOTAL_CONFIGS" ] || [ "$TOTAL_FAILED" -gt 0 ]; then
            echo "::error::Matrix stress FAILED"
            exit 1
          fi

      - name: Upload matrix report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: matrix-stress-report
          path: matrix-stress-report.json
          retention-days: 30

  # Nightly/manual: adversarial matrix (5 ADV scenarios × 4 configs)
  adversarial-stress:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'adversarial-matrix')
    runs-on: ubuntu-latest
    needs: smoke-test
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Brain CLI
        run: composer global require jarvis-brain/cli --no-interaction

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Resolve model
        id: params
        run: |
          MODEL="${{ github.event.inputs.model || 'haiku' }}"
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"

      - name: Run adversarial matrix
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAIN_AI_CMD: ${{ runner.tool_cache }}/../.composer/vendor/bin/ai
        run: |
          bash scripts/benchmark-llm-suite.sh \
            --profile adversarial-matrix \
            --json \
            --model "${{ steps.params.outputs.model }}" \
            --yolo \
            | tee adversarial-matrix-report.json

      - name: Validate adversarial JSON schema
        run: jq . adversarial-matrix-report.json > /dev/null

      - name: Check adversarial results
        run: |
          CONFIGS_PASSED=$(jq -r '.summary.configs_passed' adversarial-matrix-report.json)
          TOTAL_CONFIGS=$(jq -r '.summary.total_configs' adversarial-matrix-report.json)
          TOTAL_FAILED=$(jq -r '.summary.total_failed' adversarial-matrix-report.json)
          echo "Adversarial: $CONFIGS_PASSED/$TOTAL_CONFIGS configs passed, $TOTAL_FAILED scenarios failed"
          if [ "$CONFIGS_PASSED" -lt "$TOTAL_CONFIGS" ] || [ "$TOTAL_FAILED" -gt 0 ]; then
            echo "::error::Adversarial stress FAILED"
            exit 1
          fi

      - name: Upload adversarial report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: adversarial-matrix-report
          path: adversarial-matrix-report.json
          retention-days: 30
