name: Brain LLM Benchmark

on:
  schedule:
    - cron: '0 3 * * *'
  pull_request:
    paths:
      - '.brain/node/**'
      - 'core/src/**'
      - 'scripts/benchmark-*'
      - '.docs/benchmarks/scenarios/**'
      - '.docs/benchmarks/baselines/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Benchmark profile'
        default: 'nightly-live'
        type: choice
        options:
          - smoke
          - ci
          - telemetry-ci
          - full
          - nightly-live
          - free-live
          - golden-live
          - matrix
          - adversarial-matrix
      model:
        description: 'AI model'
        default: 'sonnet'
        type: choice
        options:
          - haiku
          - sonnet
          - opus
      agent:
        description: 'AI agent CLI'
        default: 'claude'
        type: choice
        options:
          - claude
          - opencode
          - codex
          - gemini
          - qwen

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # PR gate: dry-run only (zero API cost, ~30s)
  # Structural gates (instruction budget, PHPStan, tests) handled by brain-lint.yml
  pr-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Dry-run full profile
        run: bash scripts/benchmark-llm-suite.sh --dry-run --profile full --json > /dev/null

      - name: Dry-run telemetry-ci profile
        run: bash scripts/benchmark-llm-suite.sh --dry-run --profile telemetry-ci --json > /dev/null

      - name: Dry-run nightly-live profile
        run: bash scripts/benchmark-llm-suite.sh --dry-run --profile nightly-live --json > /dev/null

      - name: Dry-run cmd-auto profile
        run: bash scripts/benchmark-llm-suite.sh --dry-run --profile cmd-auto --json > /dev/null

      - name: Dry-run free-live profile
        run: bash scripts/benchmark-llm-suite.sh --dry-run --profile free-live --json > /dev/null

      - name: Dry-run golden-live profile
        run: bash scripts/benchmark-llm-suite.sh --dry-run --profile golden-live --json > /dev/null

      - name: Validate baselines JSON
        run: jq empty .docs/benchmarks/baselines/baselines.json

  # Nightly: smoke test (S00, haiku, ~20s)
  smoke-test:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # v2
        with:
          php-version: '8.2'

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install Brain CLI
        run: |
          composer global config github-oauth.github.com "${{ secrets.JARVIS_REPOS_TOKEN }}"
          composer global config repositories.brain-cli vcs https://github.com/jarvis-systems/brain-cli.git
          composer global config repositories.brain-core vcs https://github.com/jarvis-systems/brain-core.git
          composer global require jarvis-brain/cli --no-interaction

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run smoke test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAIN_AI_CMD: ${{ runner.tool_cache }}/../.composer/vendor/bin/ai
        run: bash scripts/benchmark-llm-suite.sh --scenario S00 --json --model haiku
        continue-on-error: true

  # Nightly: 8-scenario live proof set (haiku default, sonnet for learn protocol via model gating)
  nightly-live:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.profile || 'nightly-live') == 'nightly-live')
    runs-on: ubuntu-latest
    needs: smoke-test
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # v2
        with:
          php-version: '8.2'

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install Brain CLI
        run: |
          composer global config github-oauth.github.com "${{ secrets.JARVIS_REPOS_TOKEN }}"
          composer global config repositories.brain-cli vcs https://github.com/jarvis-systems/brain-cli.git
          composer global config repositories.brain-core vcs https://github.com/jarvis-systems/brain-core.git
          composer global require jarvis-brain/cli --no-interaction

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Resolve model
        id: params
        run: |
          MODEL="${{ github.event.inputs.model || 'sonnet' }}"
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"

      - name: Run nightly-live benchmark
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAIN_AI_CMD: ${{ runner.tool_cache }}/../.composer/vendor/bin/ai
        run: |
          bash scripts/benchmark-llm-suite.sh \
            --json \
            --profile nightly-live \
            --model "${{ steps.params.outputs.model }}" \
            --yolo \
            | tee nightly-live-report.json

      - name: Regression check
        run: bash scripts/benchmark-regression-check.sh nightly-live-report.json

      - name: Upload nightly-live report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: nightly-live-report
          path: nightly-live-report.json
          retention-days: 30

  # Manual: full/ci/telemetry-ci profile (skip if matrix, nightly-live, free-live, golden-live selected)
  benchmark-suite:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.profile != 'matrix' &&
      github.event.inputs.profile != 'adversarial-matrix' &&
      github.event.inputs.profile != 'nightly-live' &&
      github.event.inputs.profile != 'free-live' &&
      github.event.inputs.profile != 'golden-live'
    runs-on: ubuntu-latest
    needs: smoke-test
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # v2
        with:
          php-version: '8.2'

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install Brain CLI
        run: |
          composer global config github-oauth.github.com "${{ secrets.JARVIS_REPOS_TOKEN }}"
          composer global config repositories.brain-cli vcs https://github.com/jarvis-systems/brain-cli.git
          composer global config repositories.brain-core vcs https://github.com/jarvis-systems/brain-core.git
          composer global require jarvis-brain/cli --no-interaction

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Resolve profile and model
        id: params
        run: |
          PROFILE="${{ github.event.inputs.profile || 'full' }}"
          MODEL="${{ github.event.inputs.model || 'sonnet' }}"
          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"

      - name: Run benchmark suite
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAIN_AI_CMD: ${{ runner.tool_cache }}/../.composer/vendor/bin/ai
        run: |
          bash scripts/benchmark-llm-suite.sh \
            --json \
            --profile "${{ steps.params.outputs.profile }}" \
            --model "${{ steps.params.outputs.model }}" \
            | tee benchmark-report.json

      - name: Regression check
        run: |
          bash scripts/benchmark-regression-check.sh benchmark-report.json

      - name: Upload benchmark report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: benchmark-report
          path: benchmark-report.json
          retention-days: 30

  # Nightly/manual: matrix stress harness (4 configs x stress subset)
  matrix-stress:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'matrix')
    runs-on: ubuntu-latest
    needs: smoke-test
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # v2
        with:
          php-version: '8.2'

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install Brain CLI
        run: |
          composer global config github-oauth.github.com "${{ secrets.JARVIS_REPOS_TOKEN }}"
          composer global config repositories.brain-cli vcs https://github.com/jarvis-systems/brain-cli.git
          composer global config repositories.brain-core vcs https://github.com/jarvis-systems/brain-core.git
          composer global require jarvis-brain/cli --no-interaction

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Resolve model
        id: params
        run: |
          MODEL="${{ github.event.inputs.model || 'haiku' }}"
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"

      - name: Run matrix stress
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAIN_AI_CMD: ${{ runner.tool_cache }}/../.composer/vendor/bin/ai
        run: |
          bash scripts/benchmark-llm-suite.sh \
            --matrix \
            --json \
            --model "${{ steps.params.outputs.model }}" \
            --yolo \
            | tee matrix-stress-report.json

      - name: Validate matrix JSON schema
        run: jq . matrix-stress-report.json > /dev/null

      - name: Check matrix results
        run: |
          CONFIGS_PASSED=$(jq -r '.summary.configs_passed' matrix-stress-report.json)
          TOTAL_CONFIGS=$(jq -r '.summary.total_configs' matrix-stress-report.json)
          TOTAL_FAILED=$(jq -r '.summary.total_failed' matrix-stress-report.json)
          echo "Matrix: $CONFIGS_PASSED/$TOTAL_CONFIGS configs passed, $TOTAL_FAILED scenarios failed"
          if [ "$CONFIGS_PASSED" -lt "$TOTAL_CONFIGS" ] || [ "$TOTAL_FAILED" -gt 0 ]; then
            echo "::error::Matrix stress FAILED"
            exit 1
          fi

      - name: Upload matrix report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: matrix-stress-report
          path: matrix-stress-report.json
          retention-days: 30

  # Nightly/manual: adversarial matrix (7 ADV scenarios x 4 configs)
  adversarial-stress:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'adversarial-matrix')
    runs-on: ubuntu-latest
    needs: smoke-test
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # v2
        with:
          php-version: '8.2'

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install Brain CLI
        run: |
          composer global config github-oauth.github.com "${{ secrets.JARVIS_REPOS_TOKEN }}"
          composer global config repositories.brain-cli vcs https://github.com/jarvis-systems/brain-cli.git
          composer global config repositories.brain-core vcs https://github.com/jarvis-systems/brain-core.git
          composer global require jarvis-brain/cli --no-interaction

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Resolve model
        id: params
        run: |
          MODEL="${{ github.event.inputs.model || 'haiku' }}"
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"

      - name: Run adversarial matrix
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAIN_AI_CMD: ${{ runner.tool_cache }}/../.composer/vendor/bin/ai
        run: |
          bash scripts/benchmark-llm-suite.sh \
            --profile adversarial-matrix \
            --json \
            --model "${{ steps.params.outputs.model }}" \
            --yolo \
            | tee adversarial-matrix-report.json

      - name: Validate adversarial JSON schema
        run: jq . adversarial-matrix-report.json > /dev/null

      - name: Check adversarial results
        run: |
          CONFIGS_PASSED=$(jq -r '.summary.configs_passed' adversarial-matrix-report.json)
          TOTAL_CONFIGS=$(jq -r '.summary.total_configs' adversarial-matrix-report.json)
          TOTAL_FAILED=$(jq -r '.summary.total_failed' adversarial-matrix-report.json)
          echo "Adversarial: $CONFIGS_PASSED/$TOTAL_CONFIGS configs passed, $TOTAL_FAILED scenarios failed"
          if [ "$CONFIGS_PASSED" -lt "$TOTAL_CONFIGS" ] || [ "$TOTAL_FAILED" -gt 0 ]; then
            echo "::error::Adversarial stress FAILED"
            exit 1
          fi

      - name: Upload adversarial report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: adversarial-matrix-report
          path: adversarial-matrix-report.json
          retention-days: 30

  # Nightly/manual: free-first benchmark (opencode + free model, $0 cost)
  free-live:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'free-live')
    runs-on: ubuntu-latest
    needs: smoke-test
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # v2
        with:
          php-version: '8.2'

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install Brain CLI
        run: |
          composer global config github-oauth.github.com "${{ secrets.JARVIS_REPOS_TOKEN }}"
          composer global config repositories.brain-cli vcs https://github.com/jarvis-systems/brain-cli.git
          composer global config repositories.brain-core vcs https://github.com/jarvis-systems/brain-core.git
          composer global require jarvis-brain/cli --no-interaction

      - name: Install OpenCode CLI
        run: npm install -g opencode-ai@latest

      - name: Run free-live benchmark
        env:
          BRAIN_AI_CMD: ${{ runner.tool_cache }}/../.composer/vendor/bin/ai
        run: |
          bash scripts/benchmark-llm-suite.sh \
            --json \
            --profile free-live \
            --agent opencode \
            --model opencode/glm-4.7-free \
            --model-tier haiku \
            --yolo \
            | tee free-live-report.json

      - name: Regression check
        run: bash scripts/benchmark-regression-check.sh free-live-report.json

      - name: Upload free-live report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: free-live-report
          path: free-live-report.json
          retention-days: 30

  # Manual: golden verification benchmark (claude opus, high-confidence baseline)
  golden-live:
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'golden-live'
    runs-on: ubuntu-latest
    needs: smoke-test
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # v2
        with:
          php-version: '8.2'

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install Brain CLI
        run: |
          composer global config github-oauth.github.com "${{ secrets.JARVIS_REPOS_TOKEN }}"
          composer global config repositories.brain-cli vcs https://github.com/jarvis-systems/brain-cli.git
          composer global config repositories.brain-core vcs https://github.com/jarvis-systems/brain-core.git
          composer global require jarvis-brain/cli --no-interaction

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run golden-live benchmark
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAIN_AI_CMD: ${{ runner.tool_cache }}/../.composer/vendor/bin/ai
        run: |
          bash scripts/benchmark-llm-suite.sh \
            --json \
            --profile golden-live \
            --agent claude \
            --model claude-opus-4-6 \
            --model-tier opus \
            --yolo \
            | tee golden-live-report.json

      - name: Regression check
        run: bash scripts/benchmark-regression-check.sh golden-live-report.json

      - name: Upload golden-live report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: golden-live-report
          path: golden-live-report.json
          retention-days: 90
