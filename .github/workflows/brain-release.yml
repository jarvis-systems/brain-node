name: Brain Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ secrets.JARVIS_REPOS_TOKEN }}"}}'

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Checkout brain-core
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: jarvis-systems/brain-core
          path: core
          token: ${{ secrets.JARVIS_REPOS_TOKEN }}

      - name: Checkout brain-cli
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: jarvis-systems/brain-cli
          path: cli
          token: ${{ secrets.JARVIS_REPOS_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # v2
        with:
          php-version: '8.2'

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install Brain CLI
        run: |
          cd cli
          composer install --no-interaction --prefer-dist --no-progress
          echo "$GITHUB_WORKSPACE/cli/bin" >> "$GITHUB_PATH"

      - name: Validate tag matches composer.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          COMPOSER_VERSION=$(jq -r '.version' composer.json)
          if [[ "$TAG" != "$COMPOSER_VERSION" ]]; then
            echo "::error::Tag ($TAG) does not match composer.json version ($COMPOSER_VERSION)"
            exit 1
          fi
          echo "Version match: $TAG"

      - name: Compile Brain (generates .mcp.json for pin verification)
        run: brain compile
        env:
          PIN_STRICT: '1'

      - name: Verify pin policy (strict)
        run: bash scripts/verify-pins.sh
        env:
          PIN_STRICT: '1'

      - name: Validate baselines JSON
        run: jq empty .docs/benchmarks/baselines/baselines.json

      - name: Benchmark dry-run validation
        run: bash scripts/benchmark-llm-suite.sh --dry-run --json

      - name: Generate manifest
        run: bash scripts/generate-manifest.sh
        env:
          PIN_STRICT: '1'

      - name: Validate manifest
        run: |
          jq empty .docs/releases/manifest.json
          PIN_VALUE=$(jq -r '.pin_strict' .docs/releases/manifest.json)
          if [[ "$PIN_VALUE" != "1" ]]; then
            echo "::error::Manifest pin_strict must be '1' for release builds"
            exit 1
          fi

      - name: Build release bundle
        run: bash scripts/build-release-bundle.sh

      - name: Upload release bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-bundle-${{ github.ref_name }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          retention-days: 90

      - name: Upload manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-manifest-${{ github.ref_name }}
          path: .docs/releases/manifest.json
          retention-days: 90
