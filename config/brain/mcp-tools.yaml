# Brain MCP Tool Policy v1
#
# Canonical allowlist for future Brain MCP toolset.
# This does NOT implement Brain MCP yet; it's a contract to prevent
# tool surface bloat/drift.
#
# Location: config/brain/mcp-tools.yaml (repo-tracked, NOT .brain/)
# Docs: .docs/architecture/mcp-tool-policy.md

version: "1.0.0"

# Kill-switch: set BRAIN_DISABLE_MCP=true to disable all Brain MCP emission
kill_switch_env: "BRAIN_DISABLE_MCP"

# MCP v1 is READ-ONLY ONLY
# Commands that mutate state are explicitly excluded from MCP surface

categories:
  DEFAULT_READONLY:
    description: "Always available, no side effects, safe for all clients"
    commands:
      - docs
      - diagnose
      - status
      - list
      - "list:includes"
      - "list:masters"

  OPTIONAL_READONLY:
    description: "Available but may require MCP server connection"
    commands:
      - "memory:status"

# Explicitly NEVER exposed via MCP (kept CLI-only)
# These commands have side effects, require prompts, or are experimental
never:
  description: "Commands never exposed via Brain MCP - CLI only"
  reason_by_command:
    compile: "Changes filesystem, requires GO signal"
    init: "Changes filesystem, prompts for input"
    "make:*": "Scaffolding requires SELF_DEV_MODE"
    "memory:hygiene": "Destructive, requires GO signal"
    "release:prepare": "Changes versions, requires GO PRE-PUB"
    update: "Changes filesystem, requires GO signal"
    board: "Experimental AI command"
    lab: "Experimental AI command"
    run: "Experimental AI command"
    meeting: "Experimental AI command"
    "custom-run": "Experimental AI command"
    add: "Prompts for credentials, writes config"
    detail: "Prompts for credentials, writes config"
    "mcp:migrate": "Changes database schema"

# Per-client enablement
# All clients get Brain MCP by default with READ-ONLY tools
clients:
  claude:
    enabled: true
    categories:
      - DEFAULT_READONLY
      - OPTIONAL_READONLY

  codex:
    enabled: true
    categories:
      - DEFAULT_READONLY

  opencode:
    enabled: true
    categories:
      - DEFAULT_READONLY
      - OPTIONAL_READONLY

  gemini:
    enabled: true
    categories:
      - DEFAULT_READONLY

  qwen:
    enabled: true
    categories:
      - DEFAULT_READONLY

# Future expansion (NOT ACTIVE in v1)
# These would require explicit mode flags
_future_expansion:
  SELF_DEV_MODE:
    description: "Would add make:* commands when SELF_DEV_MODE=true"
    categories: []
  
  GO_PRE_PUB:
    description: "Would add compile/release commands during pre-publication"
    categories: []
